name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.4.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release -p:LetterboxdClientId="${{ secrets.LETTERBOXD_CLIENT_ID }}" -p:LetterboxdClientSecret="${{ secrets.LETTERBOXD_CLIENT_SECRET }}" --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Set target version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "REF_NAME=${{ github.event.inputs.version }}" >> $GITHUB_ENV
            echo "TAG_NAME=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            echo "REF_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "TAG_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Package
        run: |
          cd LetterboxdSync/bin/Release/net9.0
          zip -j /tmp/jellyfin-plugin-letterboxd-${{ env.REF_NAME }}.zip LetterboxdSync.dll

      - name: Prepare release notes
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '
              /^## / {
                if (capture) exit
                if ($0 ~ /^## Unreleased/ || $0 ~ /^## \[/ || $0 ~ /^## v?[0-9]/) {
                  capture = 1
                  next
                }
              }
              capture { print }
            ' CHANGELOG.md | sed '/^[[:space:]]*$/d' > /tmp/release-notes.md
          fi

          if [ ! -s /tmp/release-notes.md ]; then
            echo "See the changelog for details." > /tmp/release-notes.md
          fi

      - name: Update changelog
        run: |
          if [ ! -f CHANGELOG.md ]; then
            exit 0
          fi

          VERSION="${{ env.REF_NAME }}"
          DATE=$(date -u +"%Y-%m-%d")
          export VERSION DATE

          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("CHANGELOG.md")
          text = path.read_text(encoding="utf-8")
          version = os.environ["VERSION"]
          date = os.environ["DATE"]

          match = re.search(r"(?ms)^## Unreleased\s*\n(?P<body>.*?)(?=^## |\Z)", text)
          if not match:
              raise SystemExit(0)

          body = match.group("body").strip()
          if not body:
              raise SystemExit(0)

          replacement = f"## Unreleased\n\n## {version} - {date}\n\n{body}\n\n"
          text = text[:match.start()] + replacement + text[match.end():].lstrip()
          path.write_text(text, encoding="utf-8")
          PY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/jellyfin-plugin-letterboxd-${{ env.REF_NAME }}.zip
          tag_name: ${{ env.TAG_NAME }}
          body_path: /tmp/release-notes.md

      - name: Update manifest
        run: |
          CHECKSUM=$(md5sum /tmp/jellyfin-plugin-letterboxd-${{ env.REF_NAME }}.zip | awk '{print $1}')
          VERSION="${{ env.REF_NAME }}"
          VERSION="${VERSION#v}"
          TARGET_ABI="10.11.0.0"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${{ env.REF_NAME }}/jellyfin-plugin-letterboxd-${{ env.REF_NAME }}.zip"
          CHANGELOG_TEXT=$(cat /tmp/release-notes.md)

          # Use jq to prepend the new version, or just update checksum if it already exists
          jq --arg ver "${VERSION}" \
             --arg cs "$CHECKSUM" \
             --arg url "$SOURCE_URL" \
             --arg ts "$TIMESTAMP" \
             --arg abi "$TARGET_ABI" \
             --arg cl "$CHANGELOG_TEXT" \
            '.[0].versions |= (
               if any(.version == $ver) then
                 map(if .version == $ver then
                   .changelog = $cl |
                   .targetAbi = $abi |
                   .sourceUrl = $url |
                   .checksum = $cs |
                   .timestamp = $ts
                 else . end)
               else
                 [{version: $ver, changelog: $cl, targetAbi: $abi, sourceUrl: $url, checksum: $cs, timestamp: $ts}] + .
               end
             )' \
            manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "Update release metadata for ${{ env.REF_NAME }}"
          git push origin HEAD:main

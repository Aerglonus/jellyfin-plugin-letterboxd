<!DOCTYPE html>
<html>

<head>
    <title>Letterboxd Settings</title>
</head>

<body>
    <div id="letterboxdUserConfigPage" data-role="page" class="page type-interior">
        <style>
            :root {
                --lb-green: #40c977;
                --lb-bg: #181818;
                --lb-surface: #1f1f1f;
                --lb-card: #212121;
                --lb-card-soft: rgba(255, 255, 255, 0.05);
                --lb-border: rgba(255, 255, 255, 0.027);
                --lb-border-strong: rgba(255, 255, 255, 0.2);
                --lb-text: #adadad;
                --lb-white: #ffffff;
                --lb-blue: #339cff;
                --lb-purple: #ad7bf9;
                --lb-red: #fa423e;
                --lb-black: #000000;
            }

            body {
                background-color: var(--lb-bg) !important;
                color: var(--lb-white);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                margin: 0;
            }

            .lb-header {
                background: rgb(18, 18, 18);
                backdrop-filter: blur(10px);
                /* border-bottom: 1px solid var(--lb-border); */
                padding: 1em 2em;
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                z-index: 1000;
            }

            .lb-header-title {
                display: flex;
                align-items: center;
                gap: 0.8em;
                font-weight: bold;
                font-size: 1.2em;
                color: var(--lb-green);
            }

            .lb-header-nav {
                display: flex;
                gap: 1.5em;
            }

            .lb-nav-link {
                color: var(--lb-text);
                text-decoration: none;
                font-size: 0.9em;
                display: flex;
                align-items: center;
                gap: 0.4em;
                transition: color 0.2s;
            }

            .lb-nav-link:hover {
                color: var(--lb-white);
            }

            .lb-nav-link.active {
                color: var(--lb-green);
            }

            .lb-main {
                max-width: 800px;
                margin: 3em auto;
                padding: 0 2em;
            }

            .lb-card {
                background: var(--lb-card);
                padding: 2.5em;
                border-radius: 12px;
                border: 1px solid var(--lb-border);
                box-shadow: 0 14px 40px rgba(0, 0, 0, 0.26);
            }

            .lb-card h2 {
                margin-top: 0;
                font-size: 1.8em;
                letter-spacing: -0.02em;
            }

            .lb-field-group {
                margin-bottom: 1.8em;
            }

            .lb-label {
                display: block;
                color: var(--lb-text);
                font-size: 0.85em;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                margin-bottom: 0.6em;
            }

            .lb-input {
                width: 100%;
                background: var(--lb-surface);
                border: 1px solid var(--lb-border);
                border-radius: 6px;
                padding: 0.8em 1em;
                color: var(--lb-white);
                font-size: 1em;
                transition: border-color 0.2s;
                box-sizing: border-box;
            }

            .lb-input:focus {
                outline: none;
                border-color: var(--lb-green);
            }

            .lb-checkbox-group {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 1em;
                margin: 2em 0;
                background: var(--lb-card-soft);
                padding: 1.5em;
                border-radius: 8px;
                border: 1px solid var(--lb-border);
            }

            .lb-checkbox-label {
                display: flex;
                align-items: center;
                gap: 0.8em;
                cursor: pointer;
                color: var(--lb-text);
                font-size: 0.95em;
                transition: color 0.2s;
            }

            .lb-checkbox-label:hover {
                color: var(--lb-white);
            }

            .lb-checkbox-label input {
                accent-color: var(--lb-green);
                width: 18px;
                height: 18px;
            }

            .lb-actions {
                display: flex;
                gap: 1em;
                margin-top: 2.5em;
            }

            .lb-btn {
                padding: 0.8em 1.8em;
                border-radius: 6px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.2s;
                border: none;
                font-size: 0.95em;
                display: flex;
                align-items: center;
                gap: 0.5em;
            }

            #testBtn {
                background-color: var(--lb-green);
                color: var(--lb-black);
            }

            .lb-btn-primary {
                background: var(--lb-blue);
                color: var(--lb-black);
            }

            .lb-btn-secondary {
                background: var(--lb-card-soft);
                color: var(--lb-white);
                border: 1px solid var(--lb-border-strong);
            }

            .lb-btn-danger {
                background: transparent;
                color: var(--lb-red);
                margin-left: auto;
            }

            .lb-btn:hover {
                transform: translateY(-2px);
                filter: brightness(1.1);
            }

            .lb-status {
                margin-top: 1.5em;
                padding: 1em;
                border-radius: 6px;
                font-size: 0.9em;
                display: none;
            }

            .lb-status.success {
                display: block !important;
                background: rgba(64, 201, 119, 0.12);
                color: var(--lb-green);
                border: 1px solid rgba(64, 201, 119, 0.28);
            }

            .lb-status.error {
                display: block !important;
                background: rgba(250, 66, 62, 0.12);
                color: var(--lb-red);
                border: 1px solid rgba(250, 66, 62, 0.28);
            }

            #loadingIndicator {
                text-align: center;
                padding: 4em;
                color: var(--lb-text);
            }

            .material-icons {
                font-family: 'Material Icons';
                font-weight: normal;
                font-style: normal;
                font-size: 24px;
                line-height: 1;
                letter-spacing: normal;
                text-transform: none;
                display: inline-block;
                white-space: nowrap;
                word-wrap: normal;
                direction: ltr;
                -webkit-font-feature-settings: 'liga';
                -webkit-font-smoothing: antialiased;
            }
        </style>
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

        <header class="lb-header">
            <div class="lb-header-title">
                <span class="material-icons">movie_filter</span>
                Letterboxd Sync
            </div>
            <nav class="lb-header-nav">
                <a href="#" id="homeLink" class="lb-nav-link">
                    <span class="material-icons">home</span>
                    Jellyfin Home
                </a>
                <a href="#" id="statsLink" class="lb-nav-link">
                    <span class="material-icons">analytics</span>
                    Stats
                </a>
                <a href="#" class="lb-nav-link active">
                    <span class="material-icons">settings</span>
                    Settings
                </a>
            </nav>
        </header>

        <main class="lb-main">
            <div id="loadingIndicator">
                <span class="material-icons" style="font-size: 3em; margin-bottom: 0.3em; display: block;">sync</span>
                Loading your settings...
            </div>

            <div id="settingsForm" class="lb-card" style="display: none;">
                <h2>Connection Settings</h2>
                <p style="color: var(--lb-text); margin-bottom: 2.5em;">Connect your Letterboxd account to automatically
                    sync your Jellyfin activity.</p>

                <div class="lb-field-group">
                    <label class="lb-label">Letterboxd Username</label>
                    <input type="text" id="lbUsername" class="lb-input" placeholder="e.g. lb-user" />
                </div>

                <div class="lb-field-group">
                    <label class="lb-label">Letterboxd Password</label>
                    <input type="password" id="lbPassword" class="lb-input" />
                    <p class="c-muted" id="passwordHint" style="display: none; margin-top: 0.5em; font-size: 0.85em;">
                        Leave blank to keep your current encrypted password.</p>
                </div>

                <div class="lb-checkbox-group">
                    <label class="lb-checkbox-label">
                        <input type="checkbox" id="lbEnabled" />
                        Enable Synchronization
                    </label>
                    <label class="lb-checkbox-label">
                        <input type="checkbox" id="lbSyncFavorites" />
                        Sync favorites as liked
                    </label>
                    <label class="lb-checkbox-label">
                        <input type="checkbox" id="lbWatchlistSync" />
                        Sync Watchlist
                    </label>
                    <label class="lb-checkbox-label">
                        <input type="checkbox" id="lbDiaryImport" />
                        Import Diary
                    </label>
                    <label class="lb-checkbox-label">
                        <input type="checkbox" id="lbEnableDateFilter" />
                        Limit sync by date
                    </label>
                    <div id="dateFilterContainer" style="display: none; align-items: center; gap: 0.5em;">
                        <input type="number" id="lbDateFilterDays" class="lb-input"
                            style="width: 70px; padding: 0.4em; margin: 0;" min="1" max="365" value="7" />
                        <span style="font-size: 0.85em; color: var(--lb-text);">days</span>
                    </div>
                </div>

                <div class="lb-actions">
                    <button type="button" class="lb-btn lb-btn-primary" id="saveBtn">
                        <span class="material-icons" style="font-size: 1.2em;">save</span>
                        Save Settings
                    </button>
                    <button type="button" class="lb-btn lb-btn-secondary" id="testBtn">
                        <span class="material-icons" style="font-size: 1.2em;">link</span>
                        Test
                    </button>
                    <button type="button" class="lb-btn lb-btn-danger" id="disconnectBtn" style="display: none;">
                        Disconnect Account
                    </button>
                </div>

                <div id="statusMessage" class="lb-status"></div>
            </div>
        </main>

        <script type="text/javascript">
            var UserSettings = {
                hasExistingConfig: false,
                serverUrl: '',
                token: '',

                setStatus: function (msg, isError) {
                    var el = document.getElementById('statusMessage');
                    el.textContent = msg;
                    el.className = 'lb-status ' + (isError ? 'error' : 'success');
                    el.style.display = 'block';
                    setTimeout(function () { el.style.display = 'none'; }, 5000);
                },

                resolveAuth: function () {
                    var self = this;
                    var params = new URLSearchParams(window.location.search);
                    var pServer = params.get('server');
                    var pToken = params.get('token');

                    if (pServer && pToken) {
                        self.serverUrl = pServer;
                        self.token = pToken;
                    } else if (typeof ApiClient !== 'undefined') {
                        try {
                            self.serverUrl = ApiClient.serverAddress();
                            self.token = ApiClient.accessToken();
                        } catch (e) { }
                    }

                    if (!self.serverUrl || !self.token) {
                        try {
                            var creds = JSON.parse(localStorage.getItem('jellyfin_credentials') || '{}');
                            var server = (creds.Servers || [])[0];
                            if (server) {
                                self.serverUrl = self.serverUrl || server.ManualAddress || server.LocalAddress || '';
                                self.token = self.token || server.AccessToken || '';
                            }
                        } catch (e) { }
                    }

                    if (!self.serverUrl || !self.token) return false;

                    if (typeof window.ApiClient === 'undefined') {
                        window.ApiClient = {
                            serverAddress: function () { return self.serverUrl; },
                            accessToken: function () { return self.token; },
                            getUrl: function (path) { return self.serverUrl + '/' + path; },
                            getJSON: function (url) {
                                return fetch(url, {
                                    headers: { 'Authorization': 'MediaBrowser Token="' + self.token + '"' }
                                }).then(function (r) {
                                    if (!r.ok) throw r;
                                    return r.json();
                                });
                            },
                            ajax: function (options) {
                                return fetch(options.url, {
                                    method: options.type || 'POST',
                                    headers: {
                                        'Authorization': 'MediaBrowser Token="' + self.token + '"',
                                        'Content-Type': options.contentType || 'application/json'
                                    },
                                    body: options.data
                                }).then(function (r) {
                                    if (!r.ok) throw r;
                                    if (r.status === 204) return;
                                    return r.json();
                                });
                            }
                        };
                    }
                    return true;
                },

                init: function () {
                    var self = this;

                    if (!self.resolveAuth()) {
                        document.getElementById('loadingIndicator').innerHTML = '<span style="color: var(--lb-red);">Authentication failed. Please open this page from the Jellyfin menu.</span>';
                        return;
                    }

                    // Setup navigation links
                    var suffix = '?server=' + encodeURIComponent(self.serverUrl) + '&token=' + encodeURIComponent(self.token);
                    document.getElementById('homeLink').href = self.serverUrl + '/web/index.html';
                    document.getElementById('statsLink').href = ApiClient.getUrl('Jellyfin.Plugin.LetterboxdSync/StatsPage') + suffix;

                    console.log('[LetterboxdSync] Config page initializing...');
                    self.load();

                    document.getElementById('lbEnableDateFilter').addEventListener('change', function () {
                        document.getElementById('dateFilterContainer').style.display = this.checked ? 'flex' : 'none';
                    });

                    document.getElementById('saveBtn').addEventListener('click', function () { self.save(); });
                    document.getElementById('testBtn').addEventListener('click', function () { self.testConnection(); });
                    document.getElementById('disconnectBtn').addEventListener('click', function () {
                        if (confirm('Are you sure you want to disconnect your Letterboxd account?')) {
                            self.disconnect();
                        }
                    });
                },

                load: function () {
                    var self = this;
                    ApiClient.getJSON(ApiClient.getUrl('Jellyfin.Plugin.LetterboxdSync/UserConfig'))
                        .then(function (config) {
                            self.hasExistingConfig = true;
                            document.getElementById('lbUsername').value = config.letterboxdUsername || '';

                            if (config.hasPassword) {
                                document.getElementById('passwordHint').style.display = 'block';
                                document.getElementById('lbPassword').placeholder = '(encrypted)';
                            }

                            document.getElementById('lbEnabled').checked = config.enabled;
                            document.getElementById('lbSyncFavorites').checked = config.syncFavorites;
                            document.getElementById('lbWatchlistSync').checked = config.enableWatchlistSync;
                            document.getElementById('lbDiaryImport').checked = config.enableDiaryImport;
                            document.getElementById('lbEnableDateFilter').checked = config.enableDateFilter;
                            document.getElementById('lbDateFilterDays').value = config.dateFilterDays || 7;

                            if (config.enableDateFilter) {
                                document.getElementById('dateFilterContainer').style.display = 'flex';
                            }

                            document.getElementById('disconnectBtn').style.display = 'block';

                            self.showForm();
                        })
                        .catch(function (err) {
                            self.hasExistingConfig = false;
                            document.getElementById('lbEnabled').checked = true;
                            self.showForm();
                        });
                },

                showForm: function () {
                    document.getElementById('loadingIndicator').style.display = 'none';
                    document.getElementById('settingsForm').style.display = 'block';
                },

                collectData: function () {
                    return {
                        LetterboxdUsername: document.getElementById('lbUsername').value.trim(),
                        LetterboxdPassword: document.getElementById('lbPassword').value || null,
                        Enabled: document.getElementById('lbEnabled').checked,
                        SyncFavorites: document.getElementById('lbSyncFavorites').checked,
                        EnableWatchlistSync: document.getElementById('lbWatchlistSync').checked,
                        EnableDiaryImport: document.getElementById('lbDiaryImport').checked,
                        EnableDateFilter: document.getElementById('lbEnableDateFilter').checked,
                        DateFilterDays: parseInt(document.getElementById('lbDateFilterDays').value, 10) || 7
                    };
                },

                save: function () {
                    var self = this;
                    var data = self.collectData();

                    if (!data.LetterboxdUsername) {
                        self.setStatus('Username is required.', true);
                        return;
                    }

                    var btn = document.getElementById('saveBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="material-icons" style="font-size: 1.2em;">sync</span> Saving...';

                    ApiClient.ajax({
                        url: ApiClient.getUrl('Jellyfin.Plugin.LetterboxdSync/UserConfig'),
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(data)
                    }).then(function () {
                        btn.disabled = false;
                        btn.innerHTML = '<span class="material-icons" style="font-size: 1.2em;">save</span> Save Settings';
                        self.setStatus('Settings saved successfully.', false);
                        self.hasExistingConfig = true;
                        document.getElementById('disconnectBtn').style.display = 'block';
                        document.getElementById('lbPassword').value = '';
                        document.getElementById('passwordHint').style.display = 'block';
                        document.getElementById('lbPassword').placeholder = '(encrypted)';
                    }).catch(async function (err) {
                        btn.disabled = false;
                        btn.innerHTML = '<span class="material-icons" style="font-size: 1.2em;">save</span> Save Settings';
                        var msg = 'Failed to save settings.';
                        try {
                            if (err && typeof err.json === 'function') {
                                var eData = await err.json();
                                if (eData && eData.error) msg = eData.error;
                            }
                        } catch (e) { }
                        self.setStatus(msg, true);
                    });
                },

                testConnection: function () {
                    var self = this;
                    var data = {
                        LetterboxdUsername: document.getElementById('lbUsername').value.trim(),
                        LetterboxdPassword: document.getElementById('lbPassword').value || null
                    };

                    if (!data.LetterboxdUsername) {
                        self.setStatus('Username is required.', true);
                        return;
                    }

                    var btn = document.getElementById('testBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<span class="material-icons" style="font-size: 1.2em;">sync</span> Testing...';

                    ApiClient.ajax({
                        url: ApiClient.getUrl('Jellyfin.Plugin.LetterboxdSync/TestConnection'),
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(data)
                    }).then(function (res) {
                        btn.disabled = false;
                        btn.innerHTML = '<span class="material-icons" style="font-size: 1.2em;">link</span> Test';
                        self.setStatus('Connection successful!', false);
                    }).catch(async function (err) {
                        btn.disabled = false;
                        btn.innerHTML = '<span class="material-icons" style="font-size: 1.2em;">link</span> Test';
                        var msg = 'Connection failed.';
                        try {
                            if (err && typeof err.json === 'function') {
                                var eData = await err.json();
                                if (eData && eData.error) msg = eData.error;
                            }
                        } catch (e) { }
                        self.setStatus(msg, true);
                    });
                },

                disconnect: function () {
                    var self = this;
                    ApiClient.ajax({
                        url: ApiClient.getUrl('Jellyfin.Plugin.LetterboxdSync/UserConfig'),
                        type: 'DELETE'
                    }).then(function () {
                        document.getElementById('lbUsername').value = '';
                        document.getElementById('lbPassword').value = '';
                        document.getElementById('lbPassword').placeholder = '';
                        document.getElementById('passwordHint').style.display = 'none';
                        document.getElementById('disconnectBtn').style.display = 'none';
                        self.hasExistingConfig = false;
                        self.setStatus('Account disconnected.', false);
                    }).catch(function () {
                        self.setStatus('Failed to disconnect account.', true);
                    });
                }
            };

            UserSettings.init();
        </script>
    </div>
</body>

</html>
